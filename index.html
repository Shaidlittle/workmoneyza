async function fetchHustles(profile){
  const skills=[...new Set([...profile.skills,...profile.custom])].join(", ")||"General skills";

  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),45000);
  try{
    const r=await fetch("/api/hustle",{method:"POST",headers:{"Content-Type":"application/json"},signal:ctrl.signal,body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4096,messages:[{role:"user",content:`You are a South African side hustle expert. Generate 3 personalised side hustles for:
- Skills: ${skills}
- Province: ${profile.province}, ${profile.locationType}
- Hours/week: ${profile.hours}
- Employment: ${profile.employment}
- Capital: ${profile.capital}
- Income goal: R${profile.goal}/month
${zero?"All hustles MUST have startupCost: 0":""}
Respond with ONLY a raw JSON array, no markdown, no code fences:
[{"id":"h1","title":"Name","description":"One sentence","earningsMin":2000,"earningsMax":6000,"startupCost":0,"difficulty":"Beginner","timeToFirstIncome":"3 days","loadSheddingSafe":true,"offline":false,"reason":"Why this suits them specifically","tools":[{"name":"Gumtree","url":"https://www.gumtree.co.za"}],"startTodaySteps":["Step 1","Step 2","Step 3","Step 4","Step 5"],"whatsappPitch":"Full ready-to-paste WhatsApp message.","gumtreeUrl":"https://www.gumtree.co.za/","facebookUrl":"https://www.facebook.com/marketplace/","clientFindingTip":"Specific tip for ${profile.province}"}]
Return exactly 3 hustles. difficulty: Beginner, Intermediate, or Advanced.`}]})});
    if(!r.ok){const e=await r.text().catch(()=>"");throw new Error(`API ${r.status}: ${e.slice(0,100)}`);}
    const d=await r.json();
    const raw=d.content?.map(b=>b.text||"").join("")||"";
    const cleaned=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'');const m=cleaned.match(/\[[\s\S]*\]/);
    if(!m)throw new Error("No JSON found in response");
    return JSON.parse(m[0]);
  }finally{clearTimeout(t);}
}
